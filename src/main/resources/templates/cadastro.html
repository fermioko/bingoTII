<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Estabelecimento</title>
</head>
<body>

    <form>
        
        <!-- Campo CNPJ -->
        <label for="cnpj">CNPJ:</label>
        <input type="text" id="cnpj" name="cnpj" pattern="\d{2}\.\d{3}\.\d{3}/\d{4}-\d{2}" placeholder="XX.XXX.XXX/XXXX-XX" required><br><br>

        <!-- Campo Razão Social -->
        <label for="razaoSocial">Razão Social:</label>
        <input type="text" id="razaoSocial" name="razaoSocial" required><br><br>

        <!-- Campo E-mail -->
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required><br><br>

        <!-- Campo Telefone -->
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" pattern="\(\d{2}\) \d{4}-\d{4}" placeholder="(XX) XXXX-XXXX" required><br><br>

        <h3>Endereço</h3>
        <!-- Campo Rua -->
        <label for="rua">Rua:</label>
        <input type="text" id="rua" name="rua" required><br><br>

        <!-- Campo Número -->
        <label for="numero">Número:</label>
        <input type="text" id="numero" name="numero" required><br><br>

        <!-- Campo Cidade -->
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" name="cidade" required><br><br>

        <!-- Campo Estado -->
        <label for="estado">Estado:</label>
        <input type="text" id="estado" name="estado" required><br><br>

        <!-- Campo CEP -->
        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="cep" pattern="\d{5}-\d{3}" placeholder="XXXXX-XXX" required><br><br>

        <!-- Botão para Enviar -->
        <button type="submit">Enviar</button>



        <br>
        <input type="submit" value="Submit">

    </form>

</body>
</html>
